- type: reagent
  id: Chitoectesin
  name: reagent-name-chitoectesin
  group: Toxins
  desc: reagent-desc-chitoectesin
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: medicine
  color: "#CD853F"
  metabolisms:
    Poison:
      metabolismRate: 0.50
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.5
            Caustic: 0.5
      - !type:Polymorph
        prototype: EggSpiderTerror
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ EggSpider ]
        - !type:ReagentCondition
          reagent: Chitoectesin
          min: 10

- type: reagent
  id: Terratosomochromolin
  name: reagent-name-terratosomochromolin
  group: Toxins
  desc: reagent-desc-terratosomochromolin
  physicalDesc: reagent-physical-desc-shiny
  flavor: bitter
  color: "#8B4513"
  metabolisms:
    Poison:
      effects:
      - !type:Jitter
        conditions:
        - !type:ReagentCondition
          reagent: Terratosomochromolin
          min: 1
      - !type:MovementSpeedModifier
        walkSpeedModifier: 0.5
        sprintSpeedModifier: 0.5
      - !type:HealthChange
        damage:
          groups:
            Airloss: 4

- type: reagent
  id: Pendrotoxine
  name: reagent-name-Pendrotoxine
  group: Toxins
  slipData:
    requiredSlipSpeed: 3.5
  desc: reagent-desc-Pendrotoxine
  physicalDesc: reagent-physical-desc-reflective
  flavor: sharp
  color: "#849244"
  metabolisms:
    Poison:
      metabolismRate : 1
      effects:
      - !type:HealthChange
        damage:
          types:
             Blunt : 5
      - !type:PopupMessage
        type: Local
        visualType: LargeCaution
        messages: [ "generic-reagent-effect-bruising-insides"]
        probability: 0.33
      - !type:Emote
        emote: Scream
        probability: 0.3